<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Juhi!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace, 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #scene1 {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 2;
            transition: opacity 2s ease-in-out;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        #text-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff69b4; 
            font-size: 4rem;
            font-weight: bold;
            text-align: center;
            letter-spacing: 5px;
            text-shadow: 0 0 20px rgba(255, 105, 180, 0.8), 0 0 40px rgba(255, 105, 180, 0.4);
            font-family: Arial, sans-serif;
            pointer-events: none;
            animation: pulse 2s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(0.95); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(1.05); opacity: 1; }
        }

        #scene2 {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: #080808;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            z-index: 1;
            transition: opacity 2s ease-in-out;
            padding: 20px;
        }

        .royal-scroll {
            background: #f4ecd8; 
            border-left: 25px solid #d4af37; 
            border-right: 25px solid #d4af37; 
            box-shadow: 
                0 0 30px rgba(0, 0, 0, 0.7), 
                inset 0 0 40px rgba(139, 94, 26, 0.3); 
            padding: 40px 50px;
            max-width: 750px;
            width: 100%;
            min-height: 450px;
            position: relative;
            color: #2b1d0c; 
            font-size: 1.35rem;
            line-height: 1.8;
            text-align: center;
            font-family: 'SolaimanLipi', 'Kalpurush', 'Segoe UI', sans-serif;
            border-radius: 4px;
        }

        .royal-scroll::before {
            content: "";
            position: absolute;
            top: -10px; left: -30px; right: -30px;
            height: 15px;
            background: linear-gradient(to right, #aa7c11, #d4af37, #aa7c11);
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        .royal-scroll::after {
            content: "";
            position: absolute;
            bottom: -10px; left: -30px; right: -30px;
            height: 15px;
            background: linear-gradient(to right, #aa7c11, #d4af37, #aa7c11);
            border-radius: 10px;
            box-shadow: 0 -2px 5px rgba(0,0,0,0.5);
        }

        .wish-text {
            font-weight: 500;
            white-space: pre-line;
            text-shadow: 0px 1px 1px rgba(255,255,255,0.5);
        }

        .cursor {
            display: inline-block;
            width: 3px;
            height: 1.4rem;
            background-color: #2b1d0c;
            animation: blink 0.8s infinite;
            vertical-align: middle;
            margin-left: 2px;
        }
        @keyframes blink {
            50% { opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="scene1">
        <canvas id="matrixCanvas"></canvas>
        <div id="text-overlay">HAPPY BIRTHDAY JUHI</div>
    </div>

    <div id="scene2">
        <div class="royal-scroll">
            <span class="wish-text" id="typewriter"></span><span class="cursor" id="cursor"></span>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const katakana = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789<>[]+-*';
        const alphabet = katakana.split('');

        const fontSize = 16;
        const columns = canvas.width / fontSize;

        const rainDrops = [];

        for (let x = 0; x < columns; x++) {
            rainDrops[x] = 1;
        }

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#0F0'; 
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < rainDrops.length; i++) {
                const text = alphabet[Math.floor(Math.random() * alphabet.length)];
                ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);

                if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    rainDrops[i] = 0;
                }
                rainDrops[i]++;
            }
        }

        const matrixInterval = setInterval(drawMatrix, 30);

        const message = `১৫তম জন্মদিনের শুভেচ্ছা, জুহি! 🎉✨ 

কৈশোরের এই দারুণ সময়ে তোমাকে স্বাগতম! আমি আশা করি এই বছরটি তোমার জীবনে বয়ে আনবে অফুরন্ত হাসি, চমৎকার সব স্মৃতি আর তোমার স্বপ্ন দেখা সব কিছু। তোমার দিনটি যেন তোমার মতোই উজ্জ্বল এবং সুন্দর হয়।

জীবন নামের এই সুন্দর গল্পে তোমার প্রতিটি অধ্যায় যেন নতুন সাফল্যে ভরে ওঠে। যত বড়ই হও না কেন, আমাদের এই বন্ধুত্বের বন্ধন যেন আজীবন এমনই অটুট আর অমলিন থাকে। পেছনের সব গ্লানি ভুলে সামনের দিনগুলোতে ডানা মেলে উড়ে বেড়াও নিজের মতো করে।

একটি অবিস্মরণীয় জন্মদিন কাটুক তোমার! শুভ জন্মদিন! 🎂🎈`;

        const scene1 = document.getElementById('scene1');
        const scene2 = document.getElementById('scene2');
        const typewriterElement = document.getElementById('typewriter');
        const cursor = document.getElementById('cursor');

        setTimeout(() => {
            clearInterval(matrixInterval);
            scene1.style.opacity = '0';
            
            setTimeout(() => {
                scene1.style.display = 'none';
                scene2.style.zIndex = '2';
                scene2.style.opacity = '1';
                
                setTimeout(startTyping, 1000);
            }, 2000);
        }, 6000);

        let index = 0;
        function startTyping() {
            function type() {
                if (index < message.length) {
                    typewriterElement.textContent += message.charAt(index);
                    index++;
                    setTimeout(type, 50); 
                } else {
                    cursor.style.display = 'none'; 
                }
            }
            type();
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
