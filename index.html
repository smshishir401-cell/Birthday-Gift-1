<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Juhi!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        /* Scene 2: Anime Animation Container */
        #anime-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to bottom, #1a0b2e, #3b154d);
            opacity: 0;
            pointer-events: none;
            transition: opacity 2s ease-in-out;
        }
        #anime-container.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* Stage setup */
        .stage {
            position: relative;
            width: 600px;
            height: 400px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding-bottom: 40px;
        }

        /* Characters styling (Anime Inspired SVGs) */
        .character {
            width: 120px;
            height: 200px;
            position: relative;
            transition: all 0.5s ease;
        }
        
        .boy {
            transform: translateX(0);
        }
        .boy.smash {
            animation: pushForward 0.8s forwards ease-in-out;
        }

        .girl {
            transform: translateX(0);
            transform-origin: bottom center;
        }
        .girl.blow {
            animation: leanForward 1s ease alternate 2;
        }
        .girl.smashed {
            animation: faceplant 0.5s forwards ease-in-out;
        }

        /* Cake Styling */
        .cake-wrapper {
            position: absolute;
            left: 50%;
            bottom: 40px;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .cake {
            width: 100px;
            height: 60px;
            background: #ffb3d1;
            border-radius: 10px 10px 0 0;
            position: relative;
            border-bottom: 6px solid #ff66a3;
        }
        .cake::before {
            content: '';
            position: absolute;
            top: 15px;
            left: 0;
            width: 100%;
            height: 12px;
            background: #fff;
        }
        .candle {
            width: 8px;
            height: 25px;
            background: #66ccff;
            position: absolute;
            top: -25px;
            left: 46px;
            border-radius: 2px;
        }
        .flame {
            width: 12px;
            height: 18px;
            background: #ffcc00;
            border-radius: 50% 50% 20% 20%;
            position: absolute;
            top: -18px;
            left: -2px;
            box-shadow: 0 0 10px #ffcc00;
            animation: flicker 0.1s infinite alternate;
        }
        .flame.out {
            display: none;
        }

        /* Keyframes Animations */
        @keyframes flicker {
            0% { transform: scale(1); }
            100% { transform: scale(1.1) rotate(2deg); }
        }
        @keyframes leanForward {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(-20deg); }
        }
        @keyframes pushForward {
            0% { transform: translateX(0); }
            50% { transform: translateX(130px) rotate(5deg); }
            100% { transform: translateX(110px); }
        }
        @keyframes faceplant {
            0% { transform: rotate(0deg); }
            100% { transform: translate(30px, 40px) rotate(75deg); }
        }

        /* Speech bubbles */
        .bubble {
            position: absolute;
            background: white;
            padding: 10px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            color: #333;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .bubble::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 20px;
            border-width: 10px 10px 0;
            border-style: solid;
            border-color: white transparent;
            display: block;
            width: 0;
        }
        #boy-bubble { top: 120px; left: 100px; }
        #girl-bubble { top: 120px; right: 100px; }
        .bubble.show { opacity: 1; }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div id="anime-container">
        <div class="stage">
            
            <div class="character boy" id="boy-char">
                <div id="boy-bubble" class="bubble">Happy Birthday Juhi! 🎉</div>
                <svg viewBox="0 0 100 200" width="100%" height="100%">
                    <path d="M20,50 Q50,10 80,50 Q50,30 20,50" fill="#2c3e50"/>
                    <circle cx="50" cy="65" r="25" fill="#fcd0a1"/>
                    <circle cx="42" cy="62" r="3" fill="#333"/>
                    <circle cx="58" cy="62" r="3" fill="#333"/>
                    <path d="M45,75 Q50,80 55,75" stroke="#333" stroke-width="2" fill="none"/>
                    <path d="M30,90 L70,90 L75,160 L25,160 Z" fill="#2980b9"/>
                    <rect x="35" y="160" width="10" height="40" fill="#34495e"/>
                    <rect x="55" y="160" width="10" height="40" fill="#34495e"/>
                </svg>
            </div>

            <div class="cake-wrapper">
                <div class="cake">
                    <div class="candle"><div class="flame" id="cake-flame"></div></div>
                </div>
            </div>

            <div class="character girl" id="girl-char">
                <div id="girl-bubble" class="bubble">Make a wish! *Blows*</div>
                <svg viewBox="0 0 100 200" width="100%" height="100%">
                    <path d="M15,50 Q50,0 85,50 L85,100 L15,100 Z" fill="#e67e22"/>
                    <circle cx="50" cy="65" r="25" fill="#fcd0a1"/>
                    <circle cx="42" cy="62" r="3" fill="#333"/>
                    <circle cx="58" cy="62" r="3" fill="#333"/>
                    <path d="M45,75 Q50,82 55,75" stroke="#333" stroke-width="2" fill="none"/>
                    <path d="M35,90 L65,90 L80,160 L20,160 Z" fill="#e74c3c"/>
                    <rect x="38" y="160" width="8" height="40" fill="#fcd0a1"/>
                    <rect x="54" y="160" width="8" height="40" fill="#fcd0a1"/>
                </svg>
            </div>

        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // --- MATRIX BACKGROUND CONFIG ---
        const katakana = "01234567890101010101";
        const alphabet = katakana.split("");
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const rainDrops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#00f'; // Blue rain
            ctx.font = fontSize + 'px monospace';

            for(let i = 0; i < rainDrops.length; i++) {
                const text = alphabet[Math.floor(Math.random() * alphabet.length)];
                ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);
                
                if(rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    rainDrops[i] = 0;
                }
                rainDrops[i]++;
            }
        }

        // --- PARTICLE TEXT SYSTEM CONFIG ---
        let particles = [];
        let textStage = 0; 
        const texts = ["Happy birthday", "To YOU", "JUHI", "HEART"];
        let textTimer = 0;

        class Particle {
            constructor(x, y) {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.targetX = x;
                this.targetY = y;
                this.color = '#ff66b2'; // Pink particles
                this.size = Math.random() * 2 + 1;
                this.speed = Math.random() * 0.05 + 0.02;
            }
            update() {
                this.x += (this.targetX - this.x) * this.speed;
                this.y += (this.targetY - this.y) * this.speed;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function createTextParticles(targetText) {
            particles = [];
            ctx.fillStyle = "#fff";
            ctx.font = "bold 70px Arial";
            ctx.textAlign = "center";
            
            if (targetText === "HEART") {
                // Generate Heart coordinates
                for (let t = 0; t < Math.PI * 2; t += 0.02) {
                    // Standard parametric heart formula
                    let x = 16 * Math.pow(Math.sin(t), 3);
                    let y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
                    let posX = canvas.width / 2 + x * 15;
                    let posY = canvas.height / 2 - y * 15;
                    particles.push(new Particle(posX, posY));
                }
                return;
            }

            // Standard Text Text Generation
            ctx.fillText(targetText, canvas.width / 2, canvas.height / 2);
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Sample pixels to create points
            for (let y = 0; y < canvas.height; y += 4) {
                for (let x = 0; x < canvas.width; x += 4) {
                    if (imgData.data[(y * canvas.width + x) * 4 + 3] > 128) {
                        particles.push(new Particle(x, y));
                    }
                }
            }
        }

        // Initialize first text
        createTextParticles(texts[textStage]);

        // Main Animation loop for Scene 1
        let scene1Interval = setInterval(() => {
            drawMatrix();
            
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            textTimer++;
            // Switch text stages every ~3.5 seconds
            if(textTimer > 180) { 
                textTimer = 0;
                textStage++;
                if(textStage < texts.length) {
                    createTextParticles(texts[textStage]);
                } else {
                    // Terminate Scene 1 loop and go to Scene 2
                    clearInterval(scene1Interval);
                    transitionToScene2();
                }
            }
        }, 20);


        // --- SCENE 2: ANIME TIMELINE ---
        function transitionToScene2() {
            // Fade out canvas gently
            canvas.style.transition = "opacity 2s";
            canvas.style.opacity = 0;
            
            // Bring in the anime stage
            const animeContainer = document.getElementById('anime-container');
            animeContainer.classList.add('active');

            setTimeout(() => {
                runAnimeScript();
            }, 2000);
        }

        function runAnimeScript() {
            const boy = document.getElementById('boy-char');
            const girl = document.getElementById('girl-char');
            const flame = document.getElementById('cake-flame');
            const boyBubble = document.getElementById('boy-bubble');
            const girlBubble = document.getElementById('girl-bubble');

            // 1. Boy wishes Happy Birthday
            setTimeout(() => {
                boyBubble.classList.add('show');
            }, 1000);

            // 2. Girl prepares to blow candle
            setTimeout(() => {
                boyBubble.classList.remove('show');
                girlBubble.classList.add('show');
                girl.classList.add('blow');
            }, 4000);

            // 3. Candle goes out
            setTimeout(() => {
                flame.classList.add('out');
                girlBubble.classList.remove('show');
            }, 5200);

            // 4. Boy pranks and pushes girl's head into cake!
            setTimeout(() => {
                boy.classList.add('smash');
                girl.classList.remove('blow');
                girl.classList.add('smashed');
            }, 6500);
        }

        // Handle resizing window safely
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
