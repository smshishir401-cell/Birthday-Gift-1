<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Juhi!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace, 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Scene 1: Code Rain & Particle Text */
        #scene1 {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 2;
            transition: opacity 2s ease-in-out;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        #text-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff69b4; /* Pink */
            font-size: 4rem;
            font-weight: bold;
            text-align: center;
            letter-spacing: 5px;
            text-shadow: 0 0 20px rgba(255, 105, 180, 0.8), 0 0 40px rgba(255, 105, 180, 0.4);
            font-family: Arial, sans-serif;
            pointer-events: none;
            animation: pulse 2s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(0.95); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(1.05); opacity: 1; }
        }

        /* Scene 2: Black Page & Golden Decorated Paper */
        #scene2 {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: #0d0d0d;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            z-index: 1;
            transition: opacity 2s ease-in-out;
            padding: 20px;
        }

        .golden-paper {
            background: #1a1a1a;
            border: 5px double #d4af37; /* Golden Border */
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.3), inset 0 0 20px rgba(212, 175, 55, 0.2);
            padding: 40px;
            max-width: 700px;
            width: 100%;
            border-radius: 10px;
            position: relative;
            color: #f3e5ab; /* Soft Gold Text */
            font-size: 1.25rem;
            line-height: 1.8;
            text-align: center;
        }

        /* Decorative Corners */
        .golden-paper::before, .golden-paper::after {
            content: "✦";
            position: absolute;
            color: #d4af37;
            font-size: 1.5rem;
        }
        .golden-paper::before { top: 10px; left: 15px; }
        .golden-paper::after { bottom: 10px; right: 15px; }

        .wish-text {
            min-height: 200px;
            white-space: pre-line;
        }

        /* Cursor Effect */
        .cursor {
            display: inline-block;
            width: 10px;
            background-color: #d4af37;
            animation: blink 0.8s infinite;
        }
        @keyframes blink {
            50% { opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- Scene 1 -->
    <div id="scene1">
        <canvas id="matrixCanvas"></canvas>
        <div id="text-overlay">HAPPY BIRTHDAY JUHI</div>
    </div>

    <!-- Scene 2 -->
    <div id="scene2">
        <div class="golden-paper">
            <div class="wish-text" id="typewriter"></div><span class="cursor" id="cursor">|</span>
        </div>
    </div>

    <script>
        // --- MATRIX CODE RAIN ---
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const katakana = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789<>[]+-*';
        const alphabet = katakana.split('');

        const fontSize = 16;
        const columns = canvas.width / fontSize;

        const rainDrops = [];

        for (let x = 0; x < columns; x++) {
            rainDrops[x] = 1;
        }

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#0F0'; // Green code rain text
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < rainDrops.length; i++) {
                const text = alphabet[Math.floor(Math.random() * alphabet.length)];
                ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);

                if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    rainDrops[i] = 0;
                }
                rainDrops[i]++;
            }
        }

        const matrixInterval = setInterval(drawMatrix, 30);

        // --- TRANSITION & TYPEWRITER EFFECT ---
        const message = `১৫তম জন্মদিনের শুভেচ্ছা, জুহি! 🎉✨ 

কৈশোরের এই দারুণ সময়ে তোমাকে স্বাগতম! আমি আশা করি এই বছরটি তোমার জীবনে বয়ে আনবে অফুরন্ত হাসি, চমৎকার সব স্মৃতি আর তোমার স্বপ্ন দেখা সব কিছু। তোমার দিনটি যেন তোমার মতোই উজ্জ্বল এবং সুন্দর হয়।

জীবন নামের এই সুন্দর গল্পে তোমার প্রতিটি অধ্যায় যেন নতুন সাফল্যে ভরে ওঠে। যত বড়ই হও না কেন, আমাদের এই বন্ধুত্বের বন্ধন যেন আজীবন এমনই অটুট আর অমলিন থাকে। পেছনের সব গ্লানি ভুলে সামনের দিনগুলোতে ডানা মেলে উড়ে বেড়াও নিজের মতো করে।

একটি অবিস্মরণীয় জন্মদিন কাটুক তোমার! শুভ জন্মদিন! 🎂🎈`;

        const scene1 = document.getElementById('scene1');
        const scene2 = document.getElementById('scene2');
        const typewriterElement = document.getElementById('typewriter');
        const cursor = document.getElementById('cursor');

        // 6 সেকেন্ড পর প্রথম সিন চলে যাবে এবং ২য় সিন আসবে (6000ms)
        setTimeout(() => {
            clearInterval(matrixInterval);
            scene1.style.opacity = '0';
            
            setTimeout(() => {
                scene1.style.display = 'none';
                scene2.style.zIndex = '2';
                scene2.style.opacity = '1';
                
                // টাইপরাইটার ইফেক্ট শুরু
                setTimeout(startTyping, 1000);
            }, 2000);
        }, 6000);

        let index = 0;
        function startTyping() {
            function type() {
                if (index < message.length) {
                    typewriterElement.textContent += message.charAt(index);
                    index++;
                    setTimeout(type, 50); // টাইপিং স্পিড (মিলিসেকেন্ডে)
                } else {
                    cursor.style.display = 'none'; // টাইপিং শেষ হলে কার্সার চলে যাবে
                }
            }
            type();
        }

        // Window resize handle
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
